<!DOCTYPE html>
<html lang="de">
<head>

<meta charset="UTF-8">
<title>GEA Simulation</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body {
    font-family: Arial;
    margin: 40px;
}

canvas {
    margin-top: 40px;
    max-width: 1400px;
}

h1 {
    margin-bottom: 10px;
}

</style>

</head>
<body>

<button onclick="simulationVerbrauchGroesser()">
Beispiel 1
</button>

<button onclick="simulationErzeugungGroesser()">
Beispiel 2
</button>

<h1>Gemeinschaftliche Erzeugungslanlage</h1>

<div id="summary"></div>

<canvas id="verbrauchChart"></canvas>

<canvas id="gesamtChart"></canvas>

<script>

let chart1;
let chart2;



// ==========================================
// HILFSFUNKTIONEN
// ==========================================

function zufall(min, max) {

    return Math.floor(
        Math.random() * (max - min + 1)
    ) + min;
}


function runden(x) {

    return Math.round(x * 100) / 100;
}


function summe(objekt) {

    return Object
        .values(objekt)
        .reduce((a, b) => a + b, 0);
}


// ==========================================
// Variablen
// ==========================================

const ersparnis = 20 / 100;
const verguetung = 5 / 100;

// ==========================================
// NAMEN
// ==========================================

const verbraucherNamen = [
    "Verbraucher A",
    "Verbraucher B",
    "Verbraucher C",
    "Verbraucher D",
    "Verbraucher E",
    "Verbraucher F",
    "Verbraucher G",
    "Verbraucher H",
    "Verbraucher I",
    "Verbraucher J",
    "Verbraucher K",
    "Verbraucher L",
    "Verbraucher M",
    "Verbraucher N",
    "Lift",
    "Heizung"
];



// ==========================================
// SIMULATION
// ==========================================

function simulation(
    erzeugungMin,
    erzeugungMax,
    verbrauchMin,
    verbrauchMax
) {

    const gesamterzeugung =
        zufall(erzeugungMin, erzeugungMax);

    const verbraucher = {};

    console.log("Verbraucher");
    for (const name of verbraucherNamen) {

        verbraucher[name] =
            zufall(
                verbrauchMin,
                verbrauchMax
            );
        console.log(verbraucher[name]);
    }
    verbraucher["Lift"] = 0;

    const schluessel_statisch = 1 / verbraucherNamen.length;
    const zuteilung_statisch = gesamterzeugung * schluessel_statisch;

    const schluessel = {};

    console.log("Schlüssel");
    for (const name of verbraucherNamen) {

        console.log(name);
        schluessel[name] = schluessel_statisch;
        console.log(schluessel[name]);
    }


    const gesamtverbrauch =
        summe(verbraucher);



    // ======================================
    // STATISCH
    // ======================================

    const statisch = {};

    let summestatisch = 0;

    let gewinn_statisch = {};

    for (const name in verbraucher) {

        let zuteilung =
            gesamterzeugung *
            schluessel[name];

        zuteilung =
            Math.min(
                zuteilung,
                verbraucher[name]
            );

        statisch[name] =
            runden(zuteilung);

        gewinn_statisch[name] = zuteilung * ersparnis;

        summestatisch += zuteilung;
    }


    const einspeisungStatisch =
        gesamterzeugung -
        summestatisch;

    for (const name in verbraucher) {

        let verkauf =
            einspeisungStatisch * schluessel[name] * verguetung;

        gewinn_statisch[name] += verkauf;
        gewinn_statisch[name] = Math.round(gewinn_statisch[name]);

    }

    


    // ======================================
    // DYNAMISCH
    // ======================================

    const dynamisch = {};

    let gewinn_dynamisch = {};

    let faktorverbraucher;

    if (gesamtverbrauch > gesamterzeugung) {

        faktorverbraucher =
            gesamterzeugung /
            gesamtverbrauch;

    } else {

        faktorverbraucher = 1;
    }


    let summedynamisch = 0;

    for (const name in verbraucher) {

        const zuteilung =
            verbraucher[name] *
            faktorverbraucher;
        
        gewinn_dynamisch[name] = zuteilung * ersparnis;

        dynamisch[name] =
            runden(zuteilung);

        summedynamisch += zuteilung;
    }


    const einspeisungDynamisch =
        gesamterzeugung -
        summedynamisch;

    for (const name in verbraucher) {

        let verkauf =
            einspeisungDynamisch * schluessel[name] * verguetung;

        gewinn_dynamisch[name] += verkauf;
        gewinn_dynamisch[name] = Math.round(gewinn_dynamisch[name]);
    }



    // ======================================
    // SUMMARY
    // ======================================

    document.getElementById(
        "summary"
    ).innerHTML = `

    <p>
    <b>Gesamterzeugung:</b>
    ${runden(gesamterzeugung)} Wh
    </p>

    <p>
    <b>Gesamtverbrauch:</b>
    ${runden(gesamtverbrauch)} Wh
    </p>

    <hr>

    <p>
    <b>Statisch genutzt:</b>
    ${runden(summestatisch)} Wh
    </p>

    <p>
    <b>Statisch zugeteilt (pro Verbraucher):</b>
    ${runden(zuteilung_statisch)} Wh
    </p>

    <p>
    <b>Statische Einspeisung:</b>
    ${runden(einspeisungStatisch)} Wh
    </p>

    <p>
    <b>Statische Eigenverbrauchsquote:</b>
    ${runden(
        summestatisch /
        gesamterzeugung *
        100
    )} %
    </p>

    <hr>

    <p>
    <b>Dynamisch genutzt:</b>
    ${runden(summedynamisch)} Wh
    </p>

    <p>
    <b>Dynamische Einspeisung:</b>
    ${runden(einspeisungDynamisch)} Wh
    </p>

    <p>
    <b>Dynamische Eigenverbrauchsquote:</b>
    ${runden(
        summedynamisch /
        gesamterzeugung *
        100
    )} %
    </p>
    `;



    // ======================================
    // CHART RESET
    // ======================================

    if (chart1) chart1.destroy();
    if (chart2) chart2.destroy();



    // ======================================
    // VERBRAUCHER CHART
    // ======================================

    chart1 = new Chart(

        document.getElementById(
            "verbrauchChart"
        ),

        {
            type: "bar",

            data: {

                labels:
                    verbraucherNamen,

                datasets: [

                    {
                        label:
                            "Verbrauch (Wh)",

                        data:
                            verbraucherNamen.map(
                                n => verbraucher[n]
                            )
                    },

                    {
                        label:
                            "Dynamisch (Wh)",

                        data:
                            verbraucherNamen.map(
                                n => dynamisch[n]
                            )
                    },

                    {
                        label:
                            "Statisch (Wh)",

                        data:
                            verbraucherNamen.map(
                                n => statisch[n]
                            )
                    },

                    {
                        label:
                            "Ersparnis Dynamisch (cent)",

                        data:
                            verbraucherNamen.map(
                                n => gewinn_dynamisch[n]
                            )
                    },
                    {
                        label:
                            "Ersparnis Statisch (cent)",

                        data:
                            verbraucherNamen.map(
                                n => gewinn_statisch[n]
                            )
                    },

                ]
            }
        }
    );



    // ======================================
    // GESAMT CHART
    // ======================================

    chart2 = new Chart(

        document.getElementById(
            "gesamtChart"
        ),

        {
            type: "bar",

            data: {

                labels: [

                    "Erzeugung",

                    "Verbrauch",

                    "Statisch genutzt",

                    "Dynamisch genutzt",

                    "Statisch Einspeisung",

                    "Dynamisch Einspeisung"
                ],

                datasets: [

                    {
                        label: "Wh",

                        data: [

                            gesamterzeugung,

                            gesamtverbrauch,

                            summestatisch,

                            summedynamisch,

                            einspeisungStatisch,

                            einspeisungDynamisch
                        ]
                    }
                ]
            }
        }
    );
}



// ==========================================
// BUTTONS
// ==========================================

function simulationVerbrauchGroesser() {

    simulation(
        4000, // Erzeugung min
        6000, // Erzeugung max
        0, // Verbrauch min
        1000 // Verbrauch max
    );
}


function simulationErzeugungGroesser() {

    simulation(
        12000,
        15000,
        0,
        1800
    );
}



// ==========================================
// START
// ==========================================

simulationErzeugungGroesser();

</script>

</body>
</html>
